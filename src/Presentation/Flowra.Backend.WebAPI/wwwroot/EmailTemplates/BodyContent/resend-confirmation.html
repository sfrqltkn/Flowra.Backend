<tr>
    <td style="padding:0 24px; text-align:center;">
        <p style="
            margin:0 0 15px;
            font-family:'Segoe UI', Helvetica, Arial, sans-serif;
            font-size:24px;
            line-height:1.3;
            font-weight:600;
            color:#003A66;">
            {{Mail_Title_ResendConfirmation}}
        </p>

        <p style="
            margin:0 0 30px;
            font-family:'Segoe UI', Helvetica, Arial, sans-serif;
            font-size:15px;
            line-height:1.6;
            color:#5F6C7B;">
            {{Mail_Greeting}} <strong>{{FullName}}</strong>,<br>
            {{Mail_Body_ResendConfirmation_Info}}
        </p>
    </td>
</tr>

<tr>
    <td style="padding:0 40px 30px; text-align:center;">
        <p style="
            margin:0 0 10px;
            font-family:'Segoe UI', Helvetica, Arial, sans-serif;
            font-size:13px;
            line-height:1.5;
            color:#999999;
            text-align:center;">
            {{Mail_Body_FallbackInfo}}
        </p>

        <div style="
            width:100%;
            box-sizing:border-box;
            background-color:#F8F9FA;
            border:1px dashed #D1D5DB;
            border-radius:6px;
            padding:12px;
            font-family:Consolas, 'Courier New', monospace;
            font-size:10px;
            line-height:1.5;
            color:#6B7280;
            text-align:center;
            word-break:break-all;
            overflow-wrap:anywhere;">
            <a href="{{Url}}"
               target="_blank"
               rel="noopener"
               style="color:#6B7280; text-decoration:none;">
                {{Url}}
            </a>
        </div>
    </td>
</tr>
