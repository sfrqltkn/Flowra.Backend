<tr>
    <td style="padding:0 24px; text-align:center;">

        <p style="margin:0 0 15px;
                  font-family:'Segoe UI', Helvetica, Arial, sans-serif;
                  font-size:24px;
                  font-weight:600;
                  color:#003A66;">
            {{Mail_Title_InitialPassword}}
        </p>

        <p style="margin:0 0 30px;
                  font-family:'Segoe UI', Helvetica, Arial, sans-serif;
                  font-size:15px;
                  line-height:1.6;
                  color:#5F6C7B;">
            {{Mail_Greeting}} <strong>{{FullName}}</strong>,<br>
            {{Mail_Body_InitialPassword_Info}}
        </p>

    </td>
</tr>

<tr>
    <td style="padding:0 24px 30px; text-align:center;">

        <div style="width:100%;
                    max-width:560px;
                    background-color:#F3F8FC;
                    border:1px solid #D9E6F2;
                    border-radius:6px;
                    margin:0 auto;
                    padding:20px;
                    box-sizing:border-box;">

            <div style="margin-bottom: 10px; text-align: center;">
                <span style="display:inline-block;
                             padding:0 15px 0 0;
                             font-family:'Segoe UI', Helvetica, Arial, sans-serif;
                             font-size:14px;
                             font-weight:600;
                             color:#005596;
                             white-space:nowrap;
                             min-width: 130px;
                             text-align: right;">
                    {{Mail_Label_Username}}
                </span>
                <span style="display:inline-block;
                             font-family:Consolas,'Courier New',monospace;
                             font-size:15px;
                             font-weight:bold;
                             color:#333333;
                             text-align: left;">
                    {{UserName}}
                </span>
            </div>

            <div style="text-align: center;">
                <span style="display:inline-block;
                             padding:0 15px 0 0;
                             font-family:'Segoe UI', Helvetica, Arial, sans-serif;
                             font-size:14px;
                             font-weight:600;
                             color:#005596;
                             white-space:nowrap;
                             min-width: 130px;
                             text-align: right;">
                    {{Mail_Label_TemporaryPassword}}
                </span>
                <span style="display:inline-block;
                             font-family:Consolas,'Courier New',monospace;
                             font-size:15px;
                             font-weight:bold;
                             color:#333333;
                             text-align: left;">
                    {{Password}}
                </span>
            </div>

        </div>

    </td>
</tr>

<tr>
    <td style="padding:0 20px 30px; text-align:center;">

        <a href="{{LoginUrl}}"
           style="display:inline-block;
                  width:220px;
                  height:50px;
                  line-height:50px;
                  background-color:#005596;
                  background-image:linear-gradient(90deg,#005596 0%,#78BE20 100%);
                  color:#ffffff;
                  font-family:'Segoe UI', Helvetica, Arial, sans-serif;
                  font-size:16px;
                  font-weight:600;
                  text-align:center;
                  text-decoration:none;
                  border-radius:6px;
                  -webkit-text-size-adjust:none;">
            {{Mail_Button_InitialPassword}}
        </a>
    </td>
</tr>

<tr>
    <td style="padding:0 40px 30px; text-align:center;">

        <p style="margin:0 0 10px;
                  font-family:'Segoe UI', Helvetica, Arial, sans-serif;
                  font-size:13px;
                  color:#999999;
                  text-align:center;">
            {{Mail_Body_FallbackInfo}}
        </p>

        <div style="width:100%;
                    background-color:#F8F9FA;
                    border:1px dashed #D1D5DB;
                    border-radius:6px;
                    padding:12px;
                    font-family:Consolas,'Courier New',monospace;
                    font-size:10px;
                    line-height:1.4;
                    color:#6B7280;
                    text-align:center;
                    word-break:break-all;
                    box-sizing:border-box;">
            <a href="{{LoginUrl}}" style="text-decoration:none; color:#6B7280;">
                {{LoginUrl}}
            </a>
        </div>

    </td>
</tr>
