<h2 style="color: #d9534f; margin-top: 0; font-family: 'Segoe UI', sans-serif; border-bottom: 2px solid #d9534f; padding-bottom: 10px;">
     {{MailTitle}}
</h2>

<div style="font-family: 'Segoe UI', sans-serif; color: #555; margin-bottom: 20px;">

    <p style="margin: 5px 0;">
        <span style="font-weight: bold; color: #333;">{{Label_Subject}}:</span>
        <span style="color: #000;">{{Subject}}</span>
    </p>

    <p style="margin: 5px 0;">
        <span style="font-weight: bold; color: #333;">{{Label_Date}}:</span>
        <span>{{Date}}</span>
    </p>

</div>

<p style="color: #333; font-weight: bold; font-family: 'Segoe UI', sans-serif; margin-bottom: 5px;">
    {{Label_ErrorDetail}}:
</p>

<div style="background-color: #2b2b2b; color: #f8f8f2; padding: 15px; border-radius: 6px; border: 1px solid #444; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; text-align: left;">
    {{ErrorDetail}}
</div>

<div style="margin-top: 25px; font-size: 11px; color: #888; font-style: italic; border-top: 1px solid #eee; padding-top: 10px;">
    <p>{{InfoMessage}}</p>
</div>
